<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Simple Website</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            text-align: center;
        }

        header {
            background: #0077cc;
            color: white;
            padding: 20px;
        }

        .content {
            padding: 40px;
        }

        button {
            background: #0077cc;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #005fa3;
        }

        footer {
            background: #222;
            color: white;
            padding: 15px;
            margin-top: 40px;
        }
    </style>
</head>
<body>

<header>
    <h1>Welcome to My Website</h1>
</header>

<div class="content">
    <h2>Hello!</h2>
    <p>Yeh meri pehli simple HTML website hai.</p>

    <button onclick="showMessage()">Click Me</button>
</div>

<footer>
    &copy; 2026 My Website
</footer>

<script>
function showMessage() {
    alert("Shukriya! Aap ne button click kiya.");
}
</script>

</body>
</html>
